<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Teardown 3D</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="hud">
      <h1>Mini Teardown 3D</h1>
      <p>WASD move, mouse look, click to lock cursor. Left click throws a charge, E toggles bulldozer mode.</p>
      <div class="stats">
        <div><span>Objective:</span> <strong id="objective">Destroy 75% of city value</strong></div>
        <div><span>Destroyed:</span> <strong id="destroyed">0%</strong></div>
        <div><span>Cash:</span> <strong id="cash">$0</strong></div>
        <div><span>Tool:</span> <strong id="tool">Charge Launcher</strong></div>
      </div>
      <p id="status">Click the game view to begin.</p>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="game.js"></script>
  </body>
</html>
